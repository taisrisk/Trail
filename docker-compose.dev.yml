services:
  erme-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      TRAIL_HOME: /data/trail
      ERME_PASS_HOME: /data/pass
    volumes:
      - .:/app
      - erme-dev-node-modules:/app/node_modules
      - erme-dev-data:/data

volumes:
  erme-dev-node-modules:
  erme-dev-data:
