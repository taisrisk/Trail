services:
  erme:
    build:
      context: .
      dockerfile: Dockerfile
    image: zrorisc/erme-private-os:local
    container_name: erme-private-os
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      TRAIL_HOME: /data/trail
      ERME_PASS_HOME: /data/pass
      PUBLIC_ERME_DOMAIN: erme.onl
      PUBLIC_EMAIL_DOMAIN: email.erme.onl
      PUBLIC_PASS_DOMAIN: pass.erme.onl
      PUBLIC_SYNC_DOMAIN: sync.erme.onl
    volumes:
      - erme-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/pass/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  erme-data:
    name: erme-private-os-data
